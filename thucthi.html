    <div class="iot-card">
      <img src="img/write.png" class="book-icon" alt="book" />

      <h2>Đăng ký nội dung báo cáo IOT</h2>

      <div class="iot-content">
        <div class="left">
          <p>Sinh viên thực hiện đăng ký cảm biến cho đề tài nhà thông minh</p>
        </div>

        <button class="register-btn" type="button">Đăng Ký →</button>
      </div>
    </div>
    <!-- ===== POPUP FORM ===== -->
    <div class="modal" id="registerModal">
      <div class="modal-box">
        <span class="close-btn" onclick="closeModal()">×</span>

        <h3>Đăng ký cảm biến</h3>

        <form id="registerForm">
          <label>Họ và tên</label>
          <input type="text" id="fullname" name="fullname" required />

          <label>Mã sinh viên</label>
          <input type="text" id="mssv" name="mssv" required />

          <label>Chọn cảm biến</label>
          <select id="sensor" name="sensor" required>
            <option value="">-- Chọn cảm biến --</option>
            <option value="Cảm biến nhiệt độ">Cảm biến nhiệt độ - độ ẩm</option> 
            <option value="Cảm biến ánh sáng">Cảm biến ánh sáng</option>
            <option value="Cảm biến chuyển động">Cảm biến chuyển động</option>
            <option value="Cảm biến khí gas">Cảm biến khí gas</option>
          </select>

          <button type="submit" class="submit-btn">Gửi đăng ký</button>
        </form>
      </div>
    </div>
    <!-- Popup thông báo thành công -->
    <div id="successModal" class="success-modal">
      <div class="success-content">
        <img
          src="img/Logo_CaNhan-removebg-preview.png"
          alt="Logo"
          class="success-logo"
        />
        <h2>Bạn đã đăng ký thành công</h2>
        <button onclick="closeSuccess()">Đóng</button>
      </div>
    </div>
    <div class="end-box"></div>
