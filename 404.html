<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <title>404 - Không tìm thấy trang</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <style>
      body {
        margin: 0;
        height: 100vh;
        background: linear-gradient(135deg, #1e3c72, #2a5298);
        display: flex;
        justify-content: center;
        align-items: center;
        font-family: Arial, sans-serif;
        color: white;
        text-align: center;
      }

      .container {
        animation: fadeIn 0.8s ease;
      }

      h1 {
        font-size: 120px;
        margin: 0;
        letter-spacing: 5px;
      }

      p {
        font-size: 20px;
        margin: 10px 0 30px;
      }

      .btn {
        padding: 12px 25px;
        font-size: 16px;
        border: none;
        border-radius: 30px;
        cursor: pointer;
        background: white;
        color: #2a5298;
        font-weight: bold;
        transition: 0.3s;
        text-decoration: none;
      }

      .btn:hover {
        background: #ddd;
        transform: scale(1.05);
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>404</h1>
      <p>Oops! Trang bạn tìm không tồn tại.</p>
      <a href="thucthi.html" class="btn">Quay về </a>
    </div>
  </body>
</html>
